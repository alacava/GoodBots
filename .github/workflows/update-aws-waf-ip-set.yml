name: Generate IP Lists - Upload to AWS WAF

on:
  schedule:
    # Runs once a day at 1am (after IP lists are generated at midnight)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  UpdateAWSWAF:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq is available
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- (1) Build and validate IP list ---
      - name: Build and validate IP list from iplists-botsonly
        id: build_ips
        shell: bash
        run: |
          set -euo pipefail

          TMP_DIR="${RUNNER_TEMP:-/tmp}"
          STREAM="$TMP_DIR/stream.txt"
          ITEMS="$TMP_DIR/waf_addresses.json"
          : > "$STREAM"

          shopt -s nullglob
          for f in "$GITHUB_WORKSPACE"/iplists-botsonly/*.ips; do
            awk '
              { gsub(/\r$/,""); line=$0 }
              { sub(/^[ \t]+/, "", line); sub(/[ \t]+$/, "", line) }
              { sub(/[ \t]+#.*$/, "", line); if (line ~ /^#/) line="" }
              length(line)>0 { print line }
            ' "$f" >> "$STREAM"
          done

          TOTAL=$(wc -l < "$STREAM" || echo 0)
          echo "Candidates before validation: $TOTAL"
          [ "$TOTAL" -gt 0 ] || { echo "No candidate IPs found."; exit 1; }

          # Use Python's ipaddress module to parse, validate, and normalize.
          # IPv6 addresses are expanded to full notation (no :: compression) because
          # AWS WAF rejects compressed IPv6 like 2a03:2880:f223::/48 with
          # WAFInvalidParameterException. strict=False zeroes out any host bits.
          python3 - "$STREAM" "$ITEMS" <<'PYEOF'
          import ipaddress, sys, json

          stream_path, out_path = sys.argv[1], sys.argv[2]
          seen = set()
          result = []

          with open(stream_path) as f:
              for line in f:
                  ip = line.strip()
                  if not ip:
                      continue
                  try:
                      net = ipaddress.ip_network(ip, strict=False)
                      if isinstance(net, ipaddress.IPv6Network):
                          # Fully expand IPv6 to avoid :: notation that AWS WAF rejects
                          canonical = f"{net.network_address.exploded}/{net.prefixlen}"
                      else:
                          canonical = str(net)
                      if canonical not in seen:
                          seen.add(canonical)
                          result.append(canonical)
                  except ValueError:
                      pass

          result.sort()
          with open(out_path, 'w') as f:
              json.dump(result, f)
          PYEOF

          COUNT=$(python3 -c "import json; print(len(json.load(open('$ITEMS'))))")
          echo "Unique valid IPs to upload: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "No valid IPs produced."; exit 1; }
          echo "Preview:"; python3 -c "import json; [print(x) for x in json.load(open('$ITEMS'))[:5]]"
          echo "items_json=$ITEMS" >> "$GITHUB_OUTPUT"

      # --- (2) Get lock token (required by AWS WAF before every update) ---
      - name: Get AWS WAF IP set lock token
        id: get_lock_token
        shell: bash
        env:
          WAF_IP_SET_ID: ${{ secrets.AWS_WAF_IP_SET_ID }}
          WAF_IP_SET_NAME: ${{ secrets.AWS_WAF_IP_SET_NAME }}
          WAF_SCOPE: ${{ secrets.AWS_WAF_SCOPE }}
        run: |
          set -euo pipefail
          RESP=$(aws wafv2 get-ip-set \
            --name "$WAF_IP_SET_NAME" \
            --scope "$WAF_SCOPE" \
            --id "$WAF_IP_SET_ID")
          echo "$RESP" | jq .
          LOCK_TOKEN=$(echo "$RESP" | jq -r '.LockToken')
          [ -n "$LOCK_TOKEN" ] || { echo "Failed to get lock token"; exit 1; }
          echo "lock_token=$LOCK_TOKEN" >> "$GITHUB_OUTPUT"

      # --- (3) Replace all addresses in the IP set ---
      - name: Update AWS WAF IP set
        shell: bash
        env:
          WAF_IP_SET_ID: ${{ secrets.AWS_WAF_IP_SET_ID }}
          WAF_IP_SET_NAME: ${{ secrets.AWS_WAF_IP_SET_NAME }}
          WAF_SCOPE: ${{ secrets.AWS_WAF_SCOPE }}
          LOCK_TOKEN: ${{ steps.get_lock_token.outputs.lock_token }}
          ITEMS_JSON: ${{ steps.build_ips.outputs.items_json }}
        run: |
          set -euo pipefail

          TMP_DIR="${RUNNER_TEMP:-/tmp}"
          INPUT_JSON="$TMP_DIR/waf_input.json"

          jq -n \
            --arg name "$WAF_IP_SET_NAME" \
            --arg scope "$WAF_SCOPE" \
            --arg id "$WAF_IP_SET_ID" \
            --arg lock_token "$LOCK_TOKEN" \
            --slurpfile addresses "$ITEMS_JSON" \
            '{
              Name: $name,
              Scope: $scope,
              Id: $id,
              Addresses: $addresses[0],
              LockToken: $lock_token
            }' > "$INPUT_JSON"

          echo "Updating IP set with $(jq '.Addresses|length' "$INPUT_JSON") addresses..."

          RESP=$(aws wafv2 update-ip-set --cli-input-json "file://$INPUT_JSON")
          echo "$RESP" | jq .
          echo "AWS WAF IP set updated successfully!"
