name: Generate IP Lists - Upload to AWS WAF

on:
  schedule:
    # Runs once a day at 1am (after IP lists are generated at midnight)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  UpdateAWSWAF:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq is available
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- (1) Build and split IP list into IPv4 and IPv6 ---
      # AWS WAF IP sets are typed (IPV4 or IPV6) and reject mixed input.
      # IPv6 addresses are expanded to full notation (no :: compression) because
      # AWS WAF rejects compressed forms like 2a03:2880:f223::/48 with
      # WAFInvalidParameterException. strict=False zeroes out any host bits.
      - name: Build and split IP list from iplists-botsonly
        id: build_ips
        shell: bash
        run: |
          set -euo pipefail

          TMP_DIR="${RUNNER_TEMP:-/tmp}"
          STREAM="$TMP_DIR/stream.txt"
          IPV4_ITEMS="$TMP_DIR/waf_ipv4.json"
          IPV6_ITEMS="$TMP_DIR/waf_ipv6.json"
          : > "$STREAM"

          shopt -s nullglob
          for f in "$GITHUB_WORKSPACE"/iplists-botsonly/*.ips; do
            awk '
              { gsub(/\r$/,""); line=$0 }
              { sub(/^[ \t]+/, "", line); sub(/[ \t]+$/, "", line) }
              { sub(/[ \t]+#.*$/, "", line); if (line ~ /^#/) line="" }
              length(line)>0 { print line }
            ' "$f" >> "$STREAM"
          done

          TOTAL=$(wc -l < "$STREAM" || echo 0)
          echo "Candidates before validation: $TOTAL"
          [ "$TOTAL" -gt 0 ] || { echo "No candidate IPs found."; exit 1; }

          python3 - "$STREAM" "$IPV4_ITEMS" "$IPV6_ITEMS" <<'PYEOF'
          import ipaddress, sys, json

          stream_path, out_v4, out_v6 = sys.argv[1], sys.argv[2], sys.argv[3]
          seen_v4, seen_v6 = set(), set()
          v4, v6 = [], []

          with open(stream_path) as f:
              for line in f:
                  ip = line.strip()
                  if not ip:
                      continue
                  try:
                      net = ipaddress.ip_network(ip, strict=False)
                      if isinstance(net, ipaddress.IPv4Network):
                          canonical = str(net)
                          if canonical not in seen_v4:
                              seen_v4.add(canonical)
                              v4.append(canonical)
                      else:
                          # Fully expand to avoid :: notation that AWS WAF rejects
                          canonical = f"{net.network_address.exploded}/{net.prefixlen}"
                          if canonical not in seen_v6:
                              seen_v6.add(canonical)
                              v6.append(canonical)
                  except ValueError:
                      pass

          v4.sort()
          v6.sort()
          with open(out_v4, 'w') as f:
              json.dump(v4, f)
          with open(out_v6, 'w') as f:
              json.dump(v6, f)
          PYEOF

          V4_COUNT=$(python3 -c "import json; print(len(json.load(open('$IPV4_ITEMS'))))")
          V6_COUNT=$(python3 -c "import json; print(len(json.load(open('$IPV6_ITEMS'))))")
          echo "IPv4 addresses: $V4_COUNT"
          echo "IPv6 addresses: $V6_COUNT"
          [ "$V4_COUNT" -gt 0 ] || { echo "No valid IPv4 IPs produced."; exit 1; }
          [ "$V6_COUNT" -gt 0 ] || { echo "No valid IPv6 IPs produced."; exit 1; }
          echo "ipv4_json=$IPV4_ITEMS" >> "$GITHUB_OUTPUT"
          echo "ipv6_json=$IPV6_ITEMS" >> "$GITHUB_OUTPUT"

      # --- (2a) Update IPv4 IP set ---
      - name: Get AWS WAF IPv4 IP set lock token
        id: lock_v4
        shell: bash
        env:
          WAF_IP_SET_ID: ${{ secrets.AWS_WAF_IPV4_SET_ID }}
          WAF_IP_SET_NAME: ${{ secrets.AWS_WAF_IPV4_SET_NAME }}
          WAF_SCOPE: ${{ secrets.AWS_WAF_SCOPE }}
        run: |
          set -euo pipefail
          RESP=$(aws wafv2 get-ip-set \
            --name "$WAF_IP_SET_NAME" \
            --scope "$WAF_SCOPE" \
            --id "$WAF_IP_SET_ID")
          LOCK_TOKEN=$(echo "$RESP" | jq -r '.LockToken')
          [ -n "$LOCK_TOKEN" ] || { echo "Failed to get IPv4 lock token"; exit 1; }
          echo "lock_token=$LOCK_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Update AWS WAF IPv4 IP set
        shell: bash
        env:
          WAF_IP_SET_ID: ${{ secrets.AWS_WAF_IPV4_SET_ID }}
          WAF_IP_SET_NAME: ${{ secrets.AWS_WAF_IPV4_SET_NAME }}
          WAF_SCOPE: ${{ secrets.AWS_WAF_SCOPE }}
          LOCK_TOKEN: ${{ steps.lock_v4.outputs.lock_token }}
          ITEMS_JSON: ${{ steps.build_ips.outputs.ipv4_json }}
        run: |
          set -euo pipefail
          TMP_DIR="${RUNNER_TEMP:-/tmp}"
          INPUT_JSON="$TMP_DIR/waf_input_v4.json"
          jq -n \
            --arg name "$WAF_IP_SET_NAME" \
            --arg scope "$WAF_SCOPE" \
            --arg id "$WAF_IP_SET_ID" \
            --arg lock_token "$LOCK_TOKEN" \
            --slurpfile addresses "$ITEMS_JSON" \
            '{Name:$name,Scope:$scope,Id:$id,Addresses:$addresses[0],LockToken:$lock_token}' \
            > "$INPUT_JSON"
          echo "Updating IPv4 IP set with $(jq '.Addresses|length' "$INPUT_JSON") addresses..."
          RESP=$(aws wafv2 update-ip-set --cli-input-json "file://$INPUT_JSON")
          echo "$RESP" | jq .
          echo "IPv4 IP set updated successfully!"

      # --- (2b) Update IPv6 IP set ---
      - name: Get AWS WAF IPv6 IP set lock token
        id: lock_v6
        shell: bash
        env:
          WAF_IP_SET_ID: ${{ secrets.AWS_WAF_IPV6_SET_ID }}
          WAF_IP_SET_NAME: ${{ secrets.AWS_WAF_IPV6_SET_NAME }}
          WAF_SCOPE: ${{ secrets.AWS_WAF_SCOPE }}
        run: |
          set -euo pipefail
          RESP=$(aws wafv2 get-ip-set \
            --name "$WAF_IP_SET_NAME" \
            --scope "$WAF_SCOPE" \
            --id "$WAF_IP_SET_ID")
          LOCK_TOKEN=$(echo "$RESP" | jq -r '.LockToken')
          [ -n "$LOCK_TOKEN" ] || { echo "Failed to get IPv6 lock token"; exit 1; }
          echo "lock_token=$LOCK_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Update AWS WAF IPv6 IP set
        shell: bash
        env:
          WAF_IP_SET_ID: ${{ secrets.AWS_WAF_IPV6_SET_ID }}
          WAF_IP_SET_NAME: ${{ secrets.AWS_WAF_IPV6_SET_NAME }}
          WAF_SCOPE: ${{ secrets.AWS_WAF_SCOPE }}
          LOCK_TOKEN: ${{ steps.lock_v6.outputs.lock_token }}
          ITEMS_JSON: ${{ steps.build_ips.outputs.ipv6_json }}
        run: |
          set -euo pipefail
          TMP_DIR="${RUNNER_TEMP:-/tmp}"
          INPUT_JSON="$TMP_DIR/waf_input_v6.json"
          jq -n \
            --arg name "$WAF_IP_SET_NAME" \
            --arg scope "$WAF_SCOPE" \
            --arg id "$WAF_IP_SET_ID" \
            --arg lock_token "$LOCK_TOKEN" \
            --slurpfile addresses "$ITEMS_JSON" \
            '{Name:$name,Scope:$scope,Id:$id,Addresses:$addresses[0],LockToken:$lock_token}' \
            > "$INPUT_JSON"
          echo "Updating IPv6 IP set with $(jq '.Addresses|length' "$INPUT_JSON") addresses..."
          RESP=$(aws wafv2 update-ip-set --cli-input-json "file://$INPUT_JSON")
          echo "$RESP" | jq .
          echo "IPv6 IP set updated successfully!"
